# Render Blueprint for the AI Documentation Engine backend.
# Deploy: push to GitHub, then "New + > Blueprint" on Render and select this repo.
services:
  - type: web
    name: docengine-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false # set this in the Render dashboard
      - key: OPENROUTER_MODEL
        value: anthropic/claude-sonnet-4-6
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
    disk:
      name: docengine-data
      mountPath: /data
      sizeGB: 1
